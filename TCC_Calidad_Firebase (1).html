<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCC — Sistema de Control de Calidad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0f0f0d;--paper:#f5f0e8;--cream:#ede8db;--gold:#c9973a;--gold-light:#e8c97a;--rust:#8b3a2a;--sage:#4a5e4a;--ok:#2d6a4f;--nc-c:#8b3a2a;--line:#d4cfc4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Instrument Sans',sans-serif;min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:272px;background:var(--ink);display:flex;flex-direction:column;z-index:200;transition:width .25s;overflow:hidden;}
.sidebar.col{width:52px;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #1e1e1c;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.sb-mark{width:34px;height:34px;min-width:34px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:13px;color:var(--ink);flex-shrink:0;}
.sb-text{overflow:hidden;white-space:nowrap;}
.sb-text h1{font-family:'DM Serif Display',serif;font-size:13px;color:var(--paper);line-height:1.2;}
.sb-text p{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#555;margin-top:3px;}
.sb-tog{position:absolute;right:-11px;top:24px;width:22px;height:22px;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink);z-index:201;}
.sidebar.col .sb-tog{transform:scaleX(-1);}
.sb-sect{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#444;padding:14px 16px 6px;white-space:nowrap;overflow:hidden;}
.proj-list{flex:1;overflow-y:auto;padding:0 0 12px;}
.proj-list::-webkit-scrollbar{width:3px;}
.proj-list::-webkit-scrollbar-thumb{background:#2a2a28;}
.pj-item{padding:9px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;border-left:3px solid transparent;white-space:nowrap;overflow:hidden;}
.pj-item:hover{background:#181816;}
.pj-item.active{background:#1c1c1a;border-left-color:var(--gold);}
.pj-dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;}
.pj-item.active .pj-dot{background:var(--gold);}
.pj-info{overflow:hidden;}
.pj-name{font-family:'DM Mono',monospace;font-size:11px;color:var(--paper);letter-spacing:.04em;}
.pj-sub{font-family:'DM Mono',monospace;font-size:8px;color:#555;margin-top:1px;}
.pj-item.active .pj-name{color:var(--gold-light);}
.sb-add{margin:0 12px 14px;background:transparent;border:1px dashed #2a2a28;color:#444;padding:8px 12px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;width:calc(100% - 24px);transition:all .15s;white-space:nowrap;}
.sb-add:hover{border-color:#555;color:#888;}
.pw{margin-left:272px;transition:margin-left .25s;min-height:100vh;display:flex;flex-direction:column;}
.pw.col{margin-left:52px;}
.topbar{background:var(--ink);padding:13px 36px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.tb-left{display:flex;align-items:center;gap:14px;}
.tb-badge{background:var(--gold);color:var(--ink);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:4px 12px;font-weight:600;}
.tb-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--paper);}
.tb-right{display:flex;gap:8px;align-items:center;}
.tbtn{background:transparent;border:1px solid #2a2a28;color:#777;padding:5px 14px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.tbtn:hover{border-color:#555;color:var(--paper);}
.tbtn.gold{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.tbtn.gold:hover{background:var(--paper);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#555;display:inline-block;margin-right:4px;transition:background .3s;}
.sync-dot.green{background:#4caf50;}
.sync-dot.yellow{background:#ff9800;animation:pulse 1s infinite;}
.sync-dot.red{background:var(--rust);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sync-label{font-family:'DM Mono',monospace;font-size:8px;color:#555;letter-spacing:.08em;text-transform:uppercase;}
.screen{display:none;}
.screen.active{display:block;}
.ov-wrap{padding:44px 36px;max-width:1320px;}
.ov-title{font-family:'DM Serif Display',serif;font-size:44px;letter-spacing:-.02em;margin-bottom:4px;}
.ov-title span{color:var(--gold);}
.ov-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#888;margin-bottom:36px;}
.pj-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}
.pj-card{background:white;border:1px solid var(--line);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;}
.pj-card:hover{box-shadow:4px 4px 0 var(--ink);transform:translate(-2px,-2px);}
.pj-card-cover{width:100%;height:110px;object-fit:cover;display:block;border-bottom:1px solid var(--line);}
.pj-card-cover-ph{width:100%;height:110px;background:var(--cream);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:#bbb;}
.pj-card-top{background:var(--ink);padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;}
.pj-card-top h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--paper);}
.pj-pct{font-family:'DM Mono',monospace;font-size:18px;color:var(--gold);}
.pj-psub{font-family:'DM Mono',monospace;font-size:8px;color:#666;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.pj-card-body{padding:12px 18px;}
.area-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.area-pill{background:var(--cream);border:1px solid var(--line);padding:3px 8px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:#666;}
.pj-card-stats{display:flex;gap:14px;}
.pcs-n{font-family:'DM Serif Display',serif;font-size:18px;display:block;line-height:1;}
.pcs-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-top:2px;}
.n-rc{color:var(--rust);}
.n-rm{color:var(--gold);}
.pj-card-footer{padding:9px 18px;background:var(--cream);border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.pj-card-footer span{font-family:'DM Mono',monospace;font-size:8px;color:#888;}
.open-btn{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;padding:5px 12px;cursor:pointer;transition:background .15s;}
.open-btn:hover{background:var(--gold);color:var(--ink);}
.add-card{border:2px dashed var(--line);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;min-height:220px;cursor:pointer;transition:border-color .15s,background .15s;}
.add-card:hover{border-color:var(--gold);background:white;}
.add-card span{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#bbb;}
.add-icon{font-size:28px;color:#ccc;}
.d-hero{background:var(--cream);border-bottom:2px solid var(--ink);padding:26px 36px;}
.d-hero-inner{max-width:1320px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;}
.d-title{font-family:'DM Serif Display',serif;font-size:42px;letter-spacing:-.02em;}
.d-title span{color:var(--gold);}
.d-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#888;margin-top:5px;}
.hero-stats{display:flex;gap:14px;flex-wrap:wrap;}
.hs{background:var(--ink);color:var(--paper);padding:13px 18px;text-align:center;min-width:82px;}
.hs-n{font-family:'DM Serif Display',serif;font-size:28px;color:var(--gold);display:block;line-height:1;}
.hs-l{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-top:3px;}
.gallery-bar{background:#0a0a08;border-bottom:2px solid #1e1e1c;padding:0 36px;}
.gallery-bar-inner{max-width:1320px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:10px 0;}
.gallery-bar-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:#555;white-space:nowrap;}
.gallery-bar-label span{color:var(--gold);}
.gallery-strip{display:flex;gap:10px;overflow-x:auto;flex:1;padding:4px 0;}
.gallery-strip::-webkit-scrollbar{height:3px;}
.gallery-strip::-webkit-scrollbar-thumb{background:#2a2a28;}
.gthumb{position:relative;width:110px;min-width:110px;height:72px;background:#1a1a18;border:1px solid #2a2a28;cursor:pointer;overflow:hidden;flex-shrink:0;transition:border-color .15s;}
.gthumb:hover{border-color:var(--gold);}
.gthumb img{width:100%;height:100%;object-fit:cover;display:block;}
.gthumb-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.65);padding:2px 5px;font-family:'DM Mono',monospace;font-size:7px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gthumb-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);border:none;color:#888;width:16px;height:16px;font-size:9px;cursor:pointer;display:none;line-height:16px;text-align:center;padding:0;}
.gthumb:hover .gthumb-del{display:block;}
.gthumb-del:hover{color:var(--gold);}
.gadd-btn{width:72px;min-width:72px;height:72px;background:transparent;border:1px dashed #2a2a28;color:#444;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;flex-shrink:0;}
.gadd-btn:hover{border-color:var(--gold);color:var(--gold);}
.gadd-icon{font-size:18px;line-height:1;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:700;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.lightbox.open{display:flex;}
.lb-img{max-width:90vw;max-height:78vh;object-fit:contain;}
.lb-caption{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:#666;text-align:center;}
.lb-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#555;font-size:26px;cursor:pointer;line-height:1;}
.lb-close:hover{color:var(--paper);}
.lb-nav{display:flex;gap:16px;}
.lb-nav button{background:none;border:1px solid #2a2a28;color:#666;padding:6px 18px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}
.lb-nav button:hover{border-color:var(--gold);color:var(--gold);}
.d-main{max-width:1320px;margin:0 auto;padding:32px 36px;}
.area-tabs{display:flex;gap:0;margin-bottom:28px;border:1px solid var(--line);overflow-x:auto;flex-wrap:nowrap;}
.area-tab{padding:10px 18px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;background:white;border-right:1px solid var(--line);color:#888;transition:all .15s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:3px;}
.area-tab:last-child{border-right:none;}
.area-tab:hover{background:var(--cream);color:var(--ink);}
.area-tab.active{background:var(--ink);color:var(--gold);}
.area-tab.add-tab{color:var(--gold);background:var(--cream);font-size:13px;padding:10px 16px;letter-spacing:0;}
.area-tab.add-tab:hover{background:var(--gold);color:var(--ink);}
.tab-pct{font-size:13px;font-weight:600;}
.area-panel{display:none;}
.area-panel.active{display:block;}
.legend{display:flex;gap:18px;align-items:center;flex-wrap:wrap;padding:10px 18px;background:var(--cream);border:1px solid var(--line);margin-bottom:20px;}
.legend span{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:5px;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.dot-cr{background:var(--rust);}
.dot-ma{background:var(--gold);}
.dot-me{background:var(--sage);}
.nc-banner{display:flex;gap:28px;align-items:center;padding:12px 20px;background:var(--cream);border:1px solid var(--line);margin-bottom:24px;flex-wrap:wrap;}
.nc-title{font-family:'DM Serif Display',serif;font-size:14px;}
.nc-sub{font-family:'DM Mono',monospace;font-size:8px;color:#888;margin-top:2px;}
.ncs-n{font-family:'DM Serif Display',serif;font-size:24px;display:block;line-height:1;}
.ncs-l{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:#888;}
.n-crit{color:var(--rust);}
.n-may{color:var(--gold);}
.n-men{color:var(--sage);}
.slabel{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#888;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--line);}
.twrap{overflow-x:auto;border:1px solid var(--line);margin-bottom:32px;}
.ckt{width:100%;border-collapse:collapse;font-size:12px;}
.ckt thead tr{background:var(--ink);color:var(--paper);}
.ckt thead th{padding:8px 13px;text-align:left;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;border-right:1px solid #252523;white-space:nowrap;}
.ckt tbody tr{border-bottom:1px solid var(--line);}
.ckt tbody tr:hover:not(.phdr){background:#faf8f2;}
.ckt tbody tr.phdr{background:var(--cream);}
.ckt tbody tr.phdr td{font-family:'DM Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:8px 13px;color:#444;border-right:1px solid var(--line);}
.ckt td{padding:7px 13px;border-right:1px solid var(--line);vertical-align:middle;}
.td-n{font-family:'DM Mono',monospace;font-size:9px;color:#888;width:44px;white-space:nowrap;}
.td-s{font-family:'DM Mono',monospace;font-size:9px;color:#555;max-width:190px;}
.td-v{font-family:'DM Mono',monospace;font-size:9px;color:#777;max-width:160px;font-style:italic;}
.badge{display:inline-block;padding:2px 7px;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;}
.badge-C{background:#fde8e4;color:var(--rust);border:1px solid #f5c0b8;}
.badge-M{background:#fef3dc;color:#7a5500;border:1px solid #f5d98a;}
.badge-N{background:#e8f0e8;color:var(--sage);border:1px solid #c0d4c0;}
.ssel{background:transparent;border:1px solid var(--line);padding:3px 5px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;color:var(--ink);width:56px;}
.ssel.vC{background:#e8f5ed;color:var(--ok);border-color:#a8d8b8;}
.ssel.vNC{background:#fde8e4;color:var(--nc-c);border-color:#f5b8a8;}
.oinp{background:transparent;border:none;border-bottom:1px dashed var(--line);padding:2px 4px;font-family:'Instrument Sans',sans-serif;font-size:11px;color:var(--ink);width:100%;min-width:90px;}
.oinp:focus{outline:none;border-color:var(--gold);}
.firma-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px;}
.firma-box{border:1px solid var(--line);padding:16px;}
.firma-box label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#888;display:block;margin-bottom:8px;}
.firma-line{border-bottom:1px solid var(--ink);height:38px;margin-bottom:7px;}
.firma-box input{border:none;border-bottom:1px dashed var(--line);width:100%;font-family:'Instrument Sans',sans-serif;font-size:11px;padding:3px 0;background:transparent;display:block;margin-bottom:4px;}
.firma-box input:focus{outline:none;border-color:var(--gold);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--paper);width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;border:2px solid var(--ink);}
.modal-hd{background:var(--ink);color:var(--paper);padding:16px 22px;display:flex;justify-content:space-between;align-items:center;}
.modal-hd h3{font-family:'DM Serif Display',serif;font-size:19px;}
.modal-x{background:none;border:none;color:#666;font-size:18px;cursor:pointer;}
.modal-x:hover{color:var(--paper);}
.modal-bd{padding:22px;}
.ff{margin-bottom:16px;}
.ff label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#888;display:block;margin-bottom:5px;}
.ff input{width:100%;border:1px solid var(--line);padding:8px 11px;font-family:'Instrument Sans',sans-serif;font-size:13px;background:white;color:var(--ink);}
.ff input:focus{outline:none;border-color:var(--gold);}
.tags-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px;}
.tag-chip{background:var(--ink);color:var(--paper);padding:4px 10px;font-family:'DM Mono',monospace;font-size:9px;display:flex;align-items:center;gap:6px;}
.tag-chip button{background:none;border:none;color:#666;cursor:pointer;font-size:12px;line-height:1;padding:0;}
.tag-chip button:hover{color:var(--gold);}
.add-area-row{display:flex;gap:8px;}
.add-area-row input{flex:1;}
.add-area-row button{background:var(--gold);border:none;color:var(--ink);padding:8px 13px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;}
.modal-ft{padding:0 22px 22px;display:flex;gap:9px;justify-content:flex-end;}
.modal-ft button{padding:9px 18px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border:none;}
.m-cancel{background:var(--cream);color:#666;border:1px solid var(--line) !important;}
.m-save{background:var(--ink);color:var(--paper);}
.m-save:hover{background:var(--gold);color:var(--ink);}
.m-del{background:#fde8e4;color:var(--rust);}
.m-del:hover{background:var(--rust);color:white;}
.aai-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;align-items:center;justify-content:center;}
.aai-overlay.open{display:flex;}
.aai-box{background:var(--paper);border:2px solid var(--ink);padding:28px 28px 22px;width:380px;max-width:95vw;}
.aai-box h4{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:3px;}
.aai-box p{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-bottom:18px;}
.aai-row{display:flex;gap:8px;margin-bottom:14px;}
.aai-row input{flex:1;border:1px solid var(--line);padding:9px 12px;font-family:'Instrument Sans',sans-serif;font-size:13px;background:white;}
.aai-row input:focus{outline:none;border-color:var(--gold);}
.aai-row button{background:var(--gold);border:none;color:var(--ink);padding:9px 16px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;}
.aai-cancel{background:none;border:none;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#888;cursor:pointer;padding:0;}
.aai-cancel:hover{color:var(--ink);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--paper);padding:10px 20px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;z-index:900;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.green{border-left:3px solid #4caf50;}
.toast.yellow{border-left:3px solid #ff9800;}
@media print{.sidebar,.topbar,.area-tabs,.gallery-bar{display:none !important;}.pw{margin-left:0 !important;}.area-panel{display:block !important;}body{background:white;}}
@media(max-width:900px){.sidebar{width:52px;}.sb-text,.pj-info,.sb-sect{display:none;}.pw{margin-left:52px;}.d-main,.ov-wrap{padding:20px;}.topbar,.gallery-bar{padding-left:20px;padding-right:20px;}.firma-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <button class="sb-tog" onclick="toggleSB()">&#8249;</button>
  <div class="sb-logo">
    <div class="sb-mark">TCC</div>
    <div class="sb-text"><h1>TCC Calidad</h1><p>Control de Obra</p></div>
  </div>
  <div class="sb-sect">Proyectos</div>
  <div class="proj-list" id="projList"></div>
  <button class="sb-add" onclick="openProjModal()">+ Nuevo Proyecto</button>
</aside>

<div class="pw" id="pw">
  <div class="topbar">
    <div class="tb-left">

// ── SYNC STATUS ──────────────────────────────────────────
function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = text;
}

// ── TOAST ────────────────────────────────────────────────
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || 'green');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── FIREBASE LISTENER — real-time sync ───────────────────
function startListening() {
  setSyncStatus('yellow', 'Conectando...');
  const r = ref(db, 'tcc');
  onValue(r, (snap) => {
    const data = snap.val();
    if (data) {
      DB.projects  = data.projects  || [];
      DB.checklist = data.checklist || {};
      DB.images    = data.images    || {};
    } else {
      // Primera vez: sembrar proyecto WK
      DB = {
        projects: [{
          id: 'proj-wk', code: 'WK', desc: 'Proyecto WK', ubic: '',
          areas: ['Habitacion Principal','Vestier Principal','Habitacion Emma','Vestier Emma','Habitacion Emiliano']
        }],
        checklist: {},
        images: {}
      };
      pushToDB();
    }
    setSyncStatus('green', 'Conectado');
    renderSB();
    renderOVCards();
    if (curProjId) {
      const p = getP(curProjId);
      if (p) { renderTabs(p); updateHero(p); renderGallery(curProjId); }
    }
  }, (err) => {
    setSyncStatus('red', 'Sin conexion');
    toast('Error de conexion con Firebase', 'yellow');
  });
}

async function pushToDB() {
  setSyncStatus('yellow', 'Guardando...');
  try {
    await set(ref(db, 'tcc'), DB);
    setSyncStatus('green', 'Guardado');
  } catch(e) {
    setSyncStatus('red', 'Error al guardar');
    toast('Error al guardar en Firebase', 'yellow');
  }
}

async function patchChecklist(key, val, obs) {
  const patch = {};
  patch['tcc/checklist/' + key.replace(/\|/g,'__')] = { val: val || '', obs: obs || '' };
  try {
    await update(ref(db), patch);
  } catch(e) {
    toast('Error de sincronizacion', 'yellow');
  }
}

// ── HELPERS ──────────────────────────────────────────────
function ckKey(pid, a, fid, n) {
  return (pid + '__' + a + '__' + fid + '__' + n).replace(/\s/g,'_');
}
function getP(id) {
  for (let i = 0; i < DB.projects.length; i++) if (DB.projects[i].id === id) return DB.projects[i];
  return DB.projects[0] || null;
}
function getCK(key) { return DB.checklist[key] || { val: '', obs: '' }; }

// ── SIDEBAR ──────────────────────────────────────────────
function toggleSB() {
  document.getElementById('sidebar').classList.toggle('col');
  document.getElementById('pw').classList.toggle('col');
}
function renderSB() {
  const l = document.getElementById('projList'); l.innerHTML = '';
  const ov = document.createElement('div');
  ov.className = 'pj-item' + (curProjId === null ? ' active' : '');
  ov.innerHTML = '<div class="pj-dot"></div><div class="pj-info"><div class="pj-name">Todos los proyectos</div></div>';
  ov.onclick = () => showOV();
  l.appendChild(ov);
  DB.projects.forEach(p => {
    const el = document.createElement('div');
    el.className = 'pj-item' + (curProjId === p.id ? ' active' : '');
    el.innerHTML = '<div class="pj-dot"></div><div class="pj-info"><div class="pj-name">' + p.code + '</div><div class="pj-sub">' + p.areas.length + ' area' + (p.areas.length !== 1 ? 's' : '') + '</div></div>';
    el.onclick = () => showProj(p.id);
    l.appendChild(el);
  });
}

// ── SCREENS ──────────────────────────────────────────────
function showOV() {
  curProjId = null;
  document.getElementById('scrOV').classList.add('active');
  document.getElementById('scrDetail').classList.remove('active');
  document.getElementById('tbBadge').textContent = 'TCC';
  document.getElementById('tbTitle').textContent = 'Sistema de Control de Calidad';
  renderSB(); renderOVCards();
}
function showProj(pid) {
  curProjId = pid;
  document.getElementById('scrOV').classList.remove('active');
  document.getElementById('scrDetail').classList.add('active');
  const p = getP(pid);
  document.getElementById('tbBadge').textContent = p.code;
  document.getElementById('tbTitle').textContent = p.desc || p.code;
  document.getElementById('dPN').textContent = p.code;
  document.getElementById('dPS').textContent = [p.desc, p.ubic].filter(Boolean).join(' - ') || p.code;
  renderSB(); renderTabs(p); updateHero(p); renderGallery(pid);
}

// ── OVERVIEW CARDS ───────────────────────────────────────
function getPStats(p) {
  let done = 0, ncc = 0, ncm = 0;
  const tot = TOTAL * p.areas.length;
  p.areas.forEach(a => FASES.forEach(f => f.items.forEach(it => {
    const v = getCK(ckKey(p.id, a, f.id, it.n)).val;
    if (v) done++;
    if (v === 'NC' && it.x === 'CRITICO') ncc++;
    if (v === 'NC' && it.x === 'MAYOR')   ncm++;
  })));
  return { pct: tot > 0 ? Math.round((done / tot) * 100) : 0, ncc, ncm };
}
function renderOVCards() {
  const w = document.getElementById('ovCards'); w.innerHTML = '';
  DB.projects.forEach(p => {
    const s = getPStats(p);
    const imgs = DB.images[p.id] ? Object.values(DB.images[p.id]) : [];
    const coverHTML = imgs.length
      ? '<img class="pj-card-cover" src="' + imgs[0].data + '" alt="cover">'
      : '<div class="pj-card-cover-ph">Sin imagenes</div>';
    const pills = p.areas.map(a => '<span class="area-pill">' + a + '</span>').join('');
    const el = document.createElement('div'); el.className = 'pj-card';
    el.innerHTML = coverHTML +
      '<div class="pj-card-top"><div><h3>' + p.code + '</h3><div class="pj-psub">' + (p.desc || '') + '</div></div><div class="pj-pct">' + s.pct + '%</div></div>' +
      '<div class="pj-card-body"><div class="area-pills">' + pills + '</div>' +
      '<div class="pj-card-stats">' +
      '<div><span class="pcs-n">' + (TOTAL * p.areas.length) + '</span><span class="pcs-l">Items</span></div>' +
      '<div><span class="pcs-n n-rc">' + s.ncc + '</span><span class="pcs-l">NC Critico</span></div>' +
      '<div><span class="pcs-n n-rm">' + s.ncm + '</span><span class="pcs-l">NC Mayor</span></div>' +
      '</div></div>' +
      '<div class="pj-card-footer"><span>' + (p.ubic || 'Sin ubicacion') + '</span>' +

    w.appendChild(el);

  add.innerHTML = '<div class="add-icon">+</div><span>Nuevo Proyecto</span>';
  add.onclick = () => openProjModal();
  w.appendChild(add);

// ── GALLERY ──────────────────────────────────────────────
function renderGallery(pid) {
  const p = getP(pid);
  document.getElementById('galLabel').textContent = p.code + (p.desc ? ' - ' + p.desc : '');
  const strip = document.getElementById('galStrip'); strip.innerHTML = '';
  const imgs = DB.images[pid] ? Object.values(DB.images[pid]) : [];
  imgs.forEach((img, i) => {
    const th = document.createElement('div'); th.className = 'gthumb';
    th.innerHTML = '<img src="' + img.data + '" alt="' + (img.name || '') + '">'
      + '<div class="gthumb-label">' + (img.name || 'Imagen ' + (i + 1)) + '</div>'
      + '<button class="gthumb-del" title="Eliminar">x</button>';
    th.querySelector('img').onclick = e => { e.stopPropagation(); openLB(pid, i); };
    th.querySelector('.gthumb-del').onclick = e => { e.stopPropagation(); deleteImage(pid, img.id); };
    strip.appendChild(th);
  });
  const btn = document.createElement('button'); btn.className = 'gadd-btn';
  btn.innerHTML = '<span class="gadd-icon">+</span>Adjuntar';
  btn.onclick = () => { document.getElementById('galFileInput').dataset.pid = pid; document.getElementById('galFileInput').click(); };
  strip.appendChild(btn);
}

async function handleUpload(e) {
  const pid = e.target.dataset.pid;
  const files = Array.from(e.target.files);
  if (!files.length) return;
  toast('Subiendo ' + files.length + ' imagen(es)...', 'yellow');
  const patch = {};
  let pending = files.length;
  files.forEach(file => {
    if (!file.type.match(/^image\//)) { pending--; return; }
    const reader = new FileReader();
    reader.onload = async ev => {
      const imgId = 'img-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
      patch['tcc/images/' + pid + '/' + imgId] = {
        id: imgId,
        data: ev.target.result,
        name: file.name.replace(/\.[^.]+$/, '')
      };
      pending--;
      if (pending === 0) {
        try {
          await update(ref(db), patch);
          toast('Imagen(es) subida(s) correctamente');
        } catch(err) {
          toast('Error al subir imagen', 'yellow');
        }
      }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

async function deleteImage(pid, imgId) {
  if (!confirm('Eliminar esta imagen?')) return;
  try {
    await remove(ref(db, 'tcc/images/' + pid + '/' + imgId));
    toast('Imagen eliminada');
  } catch(e) {
    toast('Error al eliminar imagen', 'yellow');
  }
}

// ── LIGHTBOX ─────────────────────────────────────────────
function openLB(pid, idx) { lbPid = pid; lbIdx = idx; showLBImg(); document.getElementById('lightbox').classList.add('open'); }
function closeLB() { document.getElementById('lightbox').classList.remove('open'); }
function showLBImg() {
  const imgs = DB.images[lbPid] ? Object.values(DB.images[lbPid]) : [];
  if (!imgs.length) return;
  lbIdx = (lbIdx + imgs.length) % imgs.length;
  document.getElementById('lbImg').src = imgs[lbIdx].data;
  document.getElementById('lbCap').textContent = (imgs[lbIdx].name || 'Imagen ' + (lbIdx + 1)) + '  -  ' + (lbIdx + 1) + ' / ' + imgs.length;
}
function lbNav(dir) { lbIdx += dir; showLBImg(); }
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLB(); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLB();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

// ── AREA TABS ─────────────────────────────────────────────
function getAPct(pid, a) {
  let done = 0;
  FASES.forEach(f => f.items.forEach(it => { if (getCK(ckKey(pid, a, f.id, it.n)).val) done++; }));
  return Math.round((done / TOTAL) * 100);
}
function renderTabs(p) {
  const tabs = document.getElementById('areaTabs');
  const panels = document.getElementById('areaPanels');
  tabs.innerHTML = ''; panels.innerHTML = '';
  p.areas.forEach((area, idx) => {
    const pct = getAPct(p.id, area);
    const tab = document.createElement('div');
    tab.className = 'area-tab' + (idx === 0 ? ' active' : '');
    tab.innerHTML = '<span>' + area + '</span><span class="tab-pct">' + pct + '%</span>';
    tab.onclick = () => switchArea(idx, p);
    tabs.appendChild(tab);
    const panel = document.createElement('div');
    panel.className = 'area-panel' + (idx === 0 ? ' active' : '');
    panel.innerHTML = buildPanel(p.id, area);
    panels.appendChild(panel);
    if (idx === 0) updateAreaNC(p.id, area);
  });
  const addTab = document.createElement('div');
  addTab.className = 'area-tab add-tab';
  addTab.innerHTML = '&#65291; Area';
  addTab.onclick = () => openAAI(p.id);
  tabs.appendChild(addTab);
}
function switchArea(idx, p) {
  document.querySelectorAll('.area-tab:not(.add-tab)').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.area-panel').forEach((t, i) => t.classList.toggle('active', i === idx));
  updateAreaNC(p.id, p.areas[idx]);
}

function badgeCls(x) { return x === 'CRITICO' ? 'badge-C' : x === 'MAYOR' ? 'badge-M' : 'badge-N'; }

function buildPanel(pid, area) {
  const eid = area.replace(/[^a-zA-Z0-9]/g, '_');
  let h = '<div class="nc-banner">'
    + '<div><div class="nc-title">No Conformidades - ' + area + '</div><div class="nc-sub">Se actualiza al marcar NC</div></div>'
    + '<div><span class="ncs-n n-crit" id="ncc-' + eid + '">0</span><span class="ncs-l">Critico</span></div>'
    + '<div><span class="ncs-n n-may" id="ncm-' + eid + '">0</span><span class="ncs-l">Mayor</span></div>'
    + '<div><span class="ncs-n n-men" id="ncn-' + eid + '">0</span><span class="ncs-l">Menor</span></div>'
    + '</div>'
    + '<div class="legend">'
    + '<strong style="font-family:DM Mono,monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase">Criticidad:</strong>'
    + '<span><span class="dot dot-cr"></span>Critico - Detiene obra</span>'
    + '<span><span class="dot dot-ma"></span>Mayor - Corregir antes de avanzar</span>'
    + '<span><span class="dot dot-me"></span>Menor - Antes de entrega</span>'
    + '<span style="margin-left:6px;color:#888">C = Conforme | NC = No Conforme</span>'
    + '</div>'
    + '<div class="slabel">Checklist - ' + area + ' - ' + TOTAL + ' items - 7 Fases</div>'
    + '<div class="twrap"><table class="ckt"><thead><tr>'
    + '<th style="width:44px">No</th><th>Criterio</th>'
    + '<th class="td-s">Estandar / Tolerancia</th>'
    + '<th class="td-v">Metodo de Verificacion</th>'
    + '<th style="width:72px">Crit.</th>'
    + '<th style="width:58px;text-align:center">C/NC</th>'
    + '<th>Observacion</th>'
    + '</tr></thead><tbody>';
  FASES.forEach(f => {
    h += '<tr class="phdr"><td colspan="7">&#9670; ' + f.label + '</td></tr>';
    f.items.forEach(it => {
      const key = ckKey(pid, area, f.id, it.n);
      const sv = getCK(key);
      const sc = sv.val === 'C' ? ' vC' : sv.val === 'NC' ? ' vNC' : '';
      const obs = (sv.obs || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      h += '<tr>'
        + '<td class="td-n">' + it.n + '</td>'
        + '<td>' + it.c + '</td>'
        + '<td class="td-s">' + it.s + '</td>'
        + '<td class="td-v">' + it.v + '</td>'
        + '<td><span class="badge ' + badgeCls(it.x) + '">' + it.x + '</span></td>'
        + '<td style="text-align:center">'
        + '<select class="ssel' + sc + '" data-key="' + key + '" data-crit="' + it.x + '" data-pid="' + pid + '" data-area="' + area + '" onchange="onSel(this)">'
        + '<option value="">-</option>'
        + '<option value="C"' + (sv.val === 'C' ? ' selected' : '') + '>C</option>'
        + '<option value="NC"' + (sv.val === 'NC' ? ' selected' : '') + '>NC</option>'
        + '</select></td>'
        + '<td><input class="oinp" type="text" value="' + obs + '" placeholder="Observacion..." data-key="' + key + '" onchange="onObs(this)"></td>'
        + '</tr>';
    });
  });
  h += '</tbody></table></div>'
    + '<div class="slabel">Firmas de Conformidad - ' + area + '</div>'
    + '<div class="firma-grid">'
    + '<div class="firma-box"><label>Ejecutor / Maestro</label><div class="firma-line"></div><input type="text" placeholder="Nombre completo"><input type="date"></div>'
    + '<div class="firma-box"><label>Supervisor TCC</label><div class="firma-line"></div><input type="text" placeholder="Nombre completo"><input type="date"></div>'
    + '<div class="firma-box"><label>Arquitecto Responsable</label><div class="firma-line"></div><input type="text" placeholder="Nombre completo"><input type="date"></div>'
    + '</div>';
  return h;
}

// ── CHECKLIST EVENTS ─────────────────────────────────────
function onSel(sel) {
  const v = sel.value;
  sel.className = 'ssel' + (v === 'C' ? ' vC' : v === 'NC' ? ' vNC' : '');
  if (!DB.checklist[sel.dataset.key]) DB.checklist[sel.dataset.key] = { val: '', obs: '' };
  DB.checklist[sel.dataset.key].val = v;
  const obs = DB.checklist[sel.dataset.key].obs || '';
  patchChecklist(sel.dataset.key, v, obs);
  const p = getP(sel.dataset.pid);
  const idx = p.areas.indexOf(sel.dataset.area);
  const tabs = document.querySelectorAll('.area-tab:not(.add-tab)');
  if (tabs[idx]) tabs[idx].querySelector('.tab-pct').textContent = getAPct(sel.dataset.pid, sel.dataset.area) + '%';
  updateAreaNC(sel.dataset.pid, sel.dataset.area);
  updateHero(p);
}
function onObs(inp) {
  if (!DB.checklist[inp.dataset.key]) DB.checklist[inp.dataset.key] = { val: '', obs: '' };
  DB.checklist[inp.dataset.key].obs = inp.value;
  const val = DB.checklist[inp.dataset.key].val || '';
  patchChecklist(inp.dataset.key, val, inp.value);
}
function updateAreaNC(pid, area) {
  let ncc = 0, ncm = 0, ncn = 0;
  FASES.forEach(f => f.items.forEach(it => {
    const v = getCK(ckKey(pid, area, f.id, it.n)).val;
    if (v === 'NC') { if (it.x === 'CRITICO') ncc++; else if (it.x === 'MAYOR') ncm++; else ncn++; }
  }));
  const eid = area.replace(/[^a-zA-Z0-9]/g, '_');
  const ec = document.getElementById('ncc-' + eid);
  const em = document.getElementById('ncm-' + eid);
  const en = document.getElementById('ncn-' + eid);
  if (ec) ec.textContent = ncc;
  if (em) em.textContent = ncm;
  if (en) en.textContent = ncn;
}
function updateHero(p) {
  const s = getPStats(p);
  document.getElementById('dh-t').textContent = TOTAL * p.areas.length;
  document.getElementById('dh-p').textContent = s.pct + '%';
  document.getElementById('dh-nc').textContent = s.ncc;
  document.getElementById('dh-nm').textContent = s.ncm;
}

// ── MODAL PROYECTO ────────────────────────────────────────
function openProjModal(pid) {
  modalTags = [];
  document.getElementById('editProjId').value = pid || '';
  document.getElementById('fCode').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fUbic').value = '';
  document.getElementById('newAreaInp').value = '';
  document.getElementById('delProjBtn').style.display = 'none';
  if (pid) {
    const p = getP(pid);
    document.getElementById('projModalTitle').textContent = 'Editar Proyecto';
    document.getElementById('fCode').value = p.code;
    document.getElementById('fDesc').value = p.desc || '';
    document.getElementById('fUbic').value = p.ubic || '';
    modalTags = p.areas.slice();
    document.getElementById('delProjBtn').style.display = 'inline-block';
  } else {
    document.getElementById('projModalTitle').textContent = 'Nuevo Proyecto';
  }
  renderModalTags();
  document.getElementById('projModal').classList.add('open');
  setTimeout(() => document.getElementById('fCode').focus(), 100);
}
function closeProjModal() { document.getElementById('projModal').classList.remove('open'); }
document.getElementById('projModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeProjModal(); });
function addModalTag() {
  const inp = document.getElementById('newAreaInp');
  const v = inp.value.trim(); if (!v) return;
  if (!modalTags.includes(v)) modalTags.push(v);
  inp.value = ''; renderModalTags();
}
function removeModalTag(i) { modalTags.splice(i, 1); renderModalTags(); }
function renderModalTags() {
  document.getElementById('tagsWrap').innerHTML = modalTags.map((t, i) =>
    '<div class="tag-chip">' + t + '<button onclick="removeModalTag(' + i + ')">x</button></div>'
  ).join('');
}
async function saveProject() {
  const code = document.getElementById('fCode').value.trim().toUpperCase();
  if (!code) { alert('El codigo del proyecto es obligatorio.'); return; }
  const eid = document.getElementById('editProjId').value;
  if (eid) {
    const p = getP(eid);
    p.code = code;
    p.desc = document.getElementById('fDesc').value.trim();
    p.ubic = document.getElementById('fUbic').value.trim();
    p.areas = modalTags.slice();
  } else {
    DB.projects.push({
      id: 'proj-' + Date.now(), code,
      desc: document.getElementById('fDesc').value.trim(),
      ubic: document.getElementById('fUbic').value.trim(),
      areas: modalTags.slice()
    });
  }
  await pushToDB();
  closeProjModal();
  if (eid) showProj(eid); else showOV();
}
async function deleteProject() {
  const eid = document.getElementById('editProjId').value;
  if (!eid) return;
  if (!confirm('Eliminar este proyecto y todos sus datos?')) return;
  DB.projects = DB.projects.filter(p => p.id !== eid);
  Object.keys(DB.checklist).forEach(k => { if (k.startsWith(eid + '__')) delete DB.checklist[k]; });
  delete DB.images[eid];
  await pushToDB();
  closeProjModal(); showOV();
}

// ── MINI MODAL ADD AREA ───────────────────────────────────
function openAAI(pid) {
  document.getElementById('aaiLabel').textContent = 'Proyecto ' + getP(pid).code;
  document.getElementById('aaiInp').value = '';
  document.getElementById('aaiOverlay').dataset.pid = pid;
  document.getElementById('aaiOverlay').classList.add('open');
  setTimeout(() => document.getElementById('aaiInp').focus(), 100);
}
function closeAAI() { document.getElementById('aaiOverlay').classList.remove('open'); }
async function confirmAddArea() {
  const v = document.getElementById('aaiInp').value.trim(); if (!v) return;
  const pid = document.getElementById('aaiOverlay').dataset.pid;
  const p = getP(pid);
  if (p.areas.includes(v)) { alert('Esa area ya existe en este proyecto.'); return; }
  p.areas.push(v);
  await pushToDB();
  closeAAI(); showProj(pid);
  const tabs = document.querySelectorAll('.area-tab:not(.add-tab)');
  if (tabs.length) switchArea(tabs.length - 1, p);
}
document.getElementById('aaiOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeAAI(); });

window.closeAAI = closeAAI;
window.confirmAddArea = confirmAddArea;
window.onSel = onSel;
window.onObs = onObs;
window.closeLB = closeLB;

startListening();
